[main]
; in percents (1 means 1%)
volume-step=1
volume-min=0
volume-max=150

tab-order=playback,recording,output-devices,input-devices,cards
default-tab=playback

[interface]
; defaults:
; border-left=‚îÇ
; border-right=‚îÇ
; border-top=‚îÄ
; border-bottom=‚îÄ
; border-top-left=‚îå
; border-top-right=‚îê
; border-bottom-left=‚îî
; border-bottom-right=‚îò

; volume-frame-top-left=‚îå
; volume-frame-top-right=‚îê
; volume-frame-bottom-left=‚îî
; volume-frame-bottom-right=‚îò
; volume-frame-center-left=‚îú
; volume-frame-center-right=‚î§
; volume-frame-mono-left=‚ï∂
; volume-frame-mono-right=‚ï¥
; volume-frame-focus=‚îÄ

; bar-empty-char=-
; bar-full-char=#

; example: use rounded borders
border-top-left=‚ï≠
border-top-right=‚ïÆ
border-bottom-left=‚ï∞
border-bottom-right=‚ïØ
volume-frame-top-left=‚ï≠
volume-frame-top-right=‚ïÆ
volume-frame-bottom-left=‚ï∞
volume-frame-bottom-right=‚ïØ

[binds]
; keybinds in the form action=key
; supported keys are:
; all printable ASCII/Unicode: a, b, c, 1, 2, 3, –∞, –±, –≤, etc.
; some special characters: enter/tab/backtab/space/backspace/up/down/right/left
; arbitrary keycodes: code:1234 where 1234 is decimal representation of keycode
; ref: https://invisible-island.net/ncurses/ada/terminal_interface-curses_constants__ads.htm

; default binds:
focus-down=j
focus-down=down
focus-up=k
focus-up=up

focus-first=g
focus-last=G

volume-up=l
volume-up=right
volume-down=h
volume-down=left

tab-next=t
tab-next=tab
tab-prev=T
tab-prev=backtab

tab-playback=1
tab-recording=2
tab-input-devices=3
tab-output-devices=4

; mute-{enable,disable} are also valid
mute-toggle=m
; channel-lock-{enable,disable} are also valid
channel-lock-toggle=space

set-default=d

select-route=p
select-profile=P

confirm-selection=enter
cancel-selection=escape

quit=q

; additional keybinds you can configure:
; volume-set-N - set volume to N%

; use unbind=key to unbind a key from any action
